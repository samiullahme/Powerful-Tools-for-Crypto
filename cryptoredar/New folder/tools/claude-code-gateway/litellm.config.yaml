model_list:
  # Default mapping used by Claude Code when it asks for a Sonnet-class model.
  - model_name: claude-sonnet-4-5
    litellm_params:
      model: openrouter/moonshotai/kimi-k2.7-code
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: claude-sonnet-4
    litellm_params:
      model: openrouter/moonshotai/kimi-k2.7-code
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: claude-3-5-sonnet-20241022
    litellm_params:
      model: openrouter/moonshotai/kimi-k2.7-code
      api_key: os.environ/OPENROUTER_API_KEY

  # Fast/small-model alias. Kept on Kimi for consistency; change to qwen/deepseek
  # if you want cheaper background tasks.
  - model_name: claude-3-5-haiku-20241022
    litellm_params:
      model: openrouter/moonshotai/kimi-k2.7-code
      api_key: os.environ/OPENROUTER_API_KEY

  # Manual aliases for testing direct model choices through LiteLLM.
  - model_name: kimi-k2
    litellm_params:
      model: openrouter/moonshotai/kimi-k2.7-code
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: qwen3-coder
    litellm_params:
      model: openrouter/qwen/qwen3-coder
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: deepseek-v3-1
    litellm_params:
      model: openrouter/deepseek/deepseek-v3.1-terminus
      api_key: os.environ/OPENROUTER_API_KEY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

litellm_settings:
  drop_params: true
  request_timeout: 120
